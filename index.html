<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TaskPilot - A lightweight personal web application for logging, categorizing, and reviewing events and plans">
  <meta name="theme-color" content="#2c3e50">
  <title>TaskPilot - Personal Event Planner</title>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">
  
  <!-- Dexie.js for IndexedDB -->
  <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
</head>
<body>
  <!-- Login Page -->
  <div id="login-page" class="login-page">
    <div class="login-box">
      <h1>TaskPilot</h1>
      <p class="login-subtitle">Admin Login</p>
      <div class="form-group">
        <input type="password" id="login-password" placeholder="Enter admin password" onkeypress="if(event.key==='Enter')AdminManager.login()">
      </div>
      <button class="submit-btn full-width" onclick="AdminManager.login()">Login</button>
    </div>
  </div>

  <div id="app-container" class="app-container" style="display: none;">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>TaskPilot</h1>
        <span>Personal Event Planner</span>
      </div>
      <nav class="sidebar-nav">
        <div id="nav-calendar" class="nav-item active">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
          <span>Calendar</span>
        </div>
        <div id="nav-notes" class="nav-item">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
          <span>Notes</span>
        </div>

        <div id="nav-tasks" class="nav-item">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 11l3 3L22 4"></path>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
          </svg>
          <span>Tasks</span>
          <span id="task-count-badge" class="nav-badge">0</span>
        </div>
      <div id="nav-forms" class="nav-item">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1v22m6.36-20.36l-1.77 1.77M17.95 4.05l-1.77 1.77M4.05 17.95l1.77-1.77M4.05 6.05l1.77 1.77"></path>
          </svg>
          <span>Forms</span>
        </div>
        <div id="nav-waitlist" class="nav-item">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line>
          </svg>
          <span>Waitlist</span>
          <span id="waitlist-count-badge" class="nav-badge" style="display: none;">0</span>
        </div>
      </nav>

      <div style="margin-top: auto; padding: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
        <button onclick="AdminManager.logout()" style="width: 100%; padding: 10px; background: rgba(255,255,255,0.1); color: white; border: none; border-radius: 6px; cursor: pointer;">Logout</button>
      </div>

    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Calendar Container -->
      <div id="calendar-container">
        <!-- Calendar will be rendered here by JavaScript -->
      </div>

      <!-- Notes Container -->
      <div id="notes-container">
        <div class="notes-header">
          <h2>My Notes</h2>
          <button class="create-note-btn" onclick="NotesManager.createNote()">+ New Note</button>
        </div>
        
        <!-- Note Editor -->
        <div class="note-editor">
          <textarea id="note-content" placeholder="Write your note here..."></textarea>
          <div class="note-editor-actions">
            <button id="save-note-btn" class="save-note-btn" onclick="NotesManager.saveNote()">Save Note</button>
            <button id="update-note-btn" class="update-note-btn" onclick="NotesManager.updateNote()">Update Note</button>
          </div>
        </div>

        <!-- Notes List -->
        <div id="notes-list" class="notes-list">
          <!-- Notes will be rendered here by JavaScript -->
        </div>
      </div>


      <!-- Tasks Container -->
      <div id="tasks-container">
        <div class="tasks-header">
          <h2>My Tasks</h2>
          <button class="create-task-btn" onclick="TasksManager.createTask()">+ New Task</button>
        </div>
        
        <!-- Task Form -->
        <div class="task-form">
          <input type="text" id="task-input" placeholder="Enter your task...">
          <button id="add-task-btn" class="add-task-btn" onclick="TasksManager.addTask()">Add Task</button>
        </div>

        <!-- Tasks List -->
        <div id="tasks-list" class="tasks-list">
          <!-- Tasks will be rendered here by JavaScript -->
        </div>
      </div>

      <!-- Forms Container (Tabbed) -->
      <div id="forms-container" style="display: none;">
        <div class="forms-tabs">
          <button class="tab-btn active" data-tab="ahb" onclick="FormsManager.switchTab('ahb', event)">Artist Hub Booking</button>
          <button class="tab-btn" data-tab="studio" onclick="FormsManager.switchTab('studio', event)">Studio Reservation</button>
          <button class="tab-btn" data-tab="gallaga" onclick="FormsManager.switchTab('gallaga', event)">Gallaga Reservation</button>
        </div>
        <!-- Artist Hub Booking Form -->
        <div id="ahb-form" class="form-panel active">
          <form id="ahb-form-submit">
            <div class="form-grid">
              <div class="form-group"><label>Email Address</label><input name="emailAddress" type="email" required></div>
              <div class="form-group"><label>Person Inquiring</label><input name="personInquiring" required></div>
              <div class="form-group"><label>Title/Role/Affiliation</label><input name="titleRole" required></div>
              <div class="form-group"><label>I.D Number</label><input name="idNumber"></div>
              <div class="form-group"><label>Contact Number</label><input name="contactNumber" required></div>
              <div class="form-group"><label>Institutional Organization</label><input name="organization"></div>
              <div class="form-group"><label>Name of the Event</label><input name="nameOfEvent" required></div>
              <div class="form-group"><label>Event Date</label><input name="eventDate" type="date" required></div>
              <div class="form-group"><label>Event Time</label><input name="eventTime" type="time"></div>
              <div class="form-group"><label>Venue of the Event</label><input name="venue" required></div>
              <div class="form-group"><label>Event Coordinator</label><input name="coordinator"></div>
              <div class="form-group checkbox-group">
                <input type="checkbox" id="hasRehearsal" name="hasRehearsal">
                <label for="hasRehearsal">General or Technical Rehearsal?</label>
              </div>
              <div class="form-group"><label>Rehearsal Details</label><textarea name="rehearsalDetails"></textarea></div>
              <div class="form-group"><label>Requirements</label><textarea name="requirements"></textarea></div>
              <div class="form-group"><label>Performance Sequence / Songs</label><textarea name="performance"></textarea></div>
              <div class="form-group"><label>Artists Attire</label><textarea name="attire"></textarea></div>
              <div class="form-group"><label>Meal Instructions</label><textarea name="meals"></textarea></div>
              <div class="form-group"><label>Transportation</label><textarea name="transport"></textarea></div>
              <div class="form-group"><label>Honorarium</label><input name="honorarium"></div>
              <div class="form-group"><label>Other Instructions</label><textarea name="otherInstructions"></textarea></div>
              <div class="form-group"><label>Date of Booking</label><input name="bookingDate" type="date"></div>
              <div class="form-group"><label>Name of Moderator</label><input name="moderator"></div>
              <div class="form-group"><label>Number of Performers</label><input name="numPerformers" type="number"></div>
            </div>
            <button type="submit" class="submit-btn full-width">Submit Artist Hub Booking</button>
          </form>
        </div>

        <!-- Studio Reservation Form -->
        <div id="studio-form" class="form-panel">
          <form id="studio-form-submit">
            <div class="form-grid">
              <div class="form-group"><label>Date Filed</label><input name="dateFiled" type="date" required></div>
              <div class="form-group"><label>Name of Inquiry</label><input name="nameInquiry" required></div>
              <div class="form-group"><label>Date Needed</label><input name="dateNeeded" type="date" required></div>
              <div class="form-group"><label>Type of Studio</label><input name="studioType" required></div>
              <div class="form-group"><label>Purpose/Name of Event</label><input name="purpose" required></div>
              <div class="form-group"><label>Date & Time Needed</label><textarea name="dateTimeNeeded" placeholder="e.g. JAN 6,2025; 8AM-5PM"></textarea></div>
              <div class="form-group"><label>Requested by</label><input name="requestedBy" required></div>
              <div class="form-group"><label>Noted by (Head)</label><input name="notedBy"></div>
              <div class="form-group"><label>Title/Role/Affiliation</label><input name="titleRole"></div>
              <div class="form-group"><label>Email Address</label><input name="emailAddress" type="email" required></div>
              <div class="form-group"><label>NOTES</label><textarea name="notes"></textarea></div>
            </div>
            <button type="submit" class="submit-btn full-width">Submit Studio Reservation</button>
          </form>
        </div>

        <!-- Gallaga Reservation Form -->
        <div id="gallaga-form" class="form-panel">
          <form id="gallaga-form-submit">
            <div class="form-grid">
              <div class="form-group"><label>Email Address</label><input name="emailAddress" type="email" required></div>
              <div class="form-group"><label>Requested by</label><input name="requestedBy" required></div>
              <div class="form-group"><label>Name of the Activity</label><input name="activityName" required></div>
              <div class="form-group"><label>Contact Number & FB</label><input name="contactFb"></div>
              <div class="form-group"><label>Beginning Date</label><input name="beginningDate" type="date" required></div>
              <div class="form-group"><label>Ending Date</label><input name="endingDate" type="date"></div>
              <div class="form-group"><label>Number of Participants</label><input name="numParticipants" type="number" required></div>
              <div class="form-group"><label>Venue Needed</label><textarea name="venueNeeded"></textarea></div>
              <div class="form-group"><label>Materials Needed</label><textarea name="materialsNeeded"></textarea></div>
            </div>
            <button type="submit" class="submit-btn full-width">Submit Gallaga Reservation</button>
          </form>
        </div>
      </div>

      <!-- Admin Container -->
      <div id="admin-container" style="display: none;">
        <div class="admin-header">
          <h2>Waitlist / Reservations <span id="pending-count" class="badge">0</span></h2>
          <button onclick="AdminManager.logout()" class="logout-btn" style="display: none;">Logout</button>
        </div>
        <table id="pending-table" class="admin-table">
          <thead>
            <tr><th>ID</th><th>Type</th><th>Submitter</th><th>Date</th><th>Status</th><th>Actions</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </main>

  </div>

  <!-- Event Panel Overlay -->
  <div id="panel-overlay" class="panel-overlay" onclick="EventManager.hidePanel()"></div>

  <!-- Event Panel -->
  <div id="event-panel" class="event-panel">
    <div class="event-panel-header">
      <h3 id="selected-date-display">Select a Date</h3>
      <button id="close-event-panel" class="close-panel-btn" onclick="EventManager.hidePanel()">&times;</button>
    </div>
    <div class="event-panel-content">
      <!-- Events List -->
      <div id="events-list" class="events-list">
        <!-- Events will be rendered here -->
      </div>

      <!-- Event Form -->
      <div id="event-form-container" class="event-form-container">
        <form id="event-form">
          <input type="hidden" id="event-date">
          
          <h4>Add/Edit Event</h4>
          
          <div class="form-group">
            <label for="event-description">Description</label>
            <input type="text" id="event-description" placeholder="Event description">
          </div>
          
          <div class="form-group">
            <label for="event-club">Club</label>
            <select id="event-club" class="club-select">
              <option value="">None</option>
              <option value="C">De la Salle Chorale (C)</option>
              <option value="V">Vivace (V)</option>
              <option value="M">Musikat (M)</option>
              <option value="P">PSG (P)</option>
              <option value="T">Maskara (T)</option>
              <option value="J">JBDC (J)</option>
              <option value="G">GLYF (G)</option>
              <option value="R">Ritmo Verde (R)</option>
              <option value="S">Santermo (S)</option>
              <option value="L">LFS (L)</option>
              <option value="I">IWAG (I)</option>
            </select>
          </div>
          
          <div class="form-group">
            <label for="event-color">Category Color</label>
            <select id="event-color" class="color-select">
              <option value="#000000">AH Club bookings (Black)</option>
              <option value="#3498db">Theater (Blue)</option>
              <option value="#2ecc71">Personal (Green)</option>
              <option value="#e74c3c">AH Activities, Meetings (Red)</option>
              <option value="#9b59b6">Other (Purple)</option>
            </select>
          </div>
          
          <div class="form-group">
            <label for="event-end-date">End Date (optional for multi-day events)</label>
            <input type="date" id="event-end-date">
          </div>
          
          <div class="form-group checkbox-group">
            <input type="checkbox" id="event-theater">
            <label for="event-theater">Theater Reservation (G)</label>
          </div>
          
          <div class="form-group">
            <label for="event-notes">Notes</label>
            <textarea id="event-notes" placeholder="Add notes for this event..."></textarea>
          </div>
          
          <div class="form-actions">
            <button type="submit" id="event-submit-btn" class="submit-btn">Add Event</button>
            <button type="button" id="delete-event-btn" class="delete-btn" style="display: none;">Delete</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- NEW Booking Panel Overlay -->
  <div id="booking-overlay" class="panel-overlay" onclick="BookingsManager.hideBookingPanel()"></div>
<!-- NEW Booking Panel -->
  <div id="booking-panel" class="booking-panel">
    <div class="booking-panel-header">
      <h3 id="booking-club-display">Club Booking</h3>
      <button id="close-booking-panel" class="close-panel-btn" onclick="BookingsManager.hideBookingPanel()">&times;</button>
    </div>
    <div class="booking-panel-content">
      <!-- Booking Form (Minimal) -->
      <div id="booking-form-container" class="event-form-container">
        <form id="booking-form">
          <input type="hidden" id="booking-club" value="">
          <input type="hidden" id="booking-color" value="#06402B">
          
          <h4>Add Booking</h4>
          
          <div class="form-group">
            <label for="booking-description">Description</label>
            <input type="text" id="booking-description" placeholder="Event description" required>
          </div>
          
          <div class="form-group">
            <label for="booking-date">Date <span class="required">*</span></label>
            <input type="date" id="booking-date" required>
          </div>
          
          <div class="form-group">
            <label for="booking-attire">Attire</label>
            <input type="text" id="booking-attire" placeholder="e.g. Formal, Casual">
          </div>
          
          <div class="form-group">
            <label for="booking-location">Location</label>
            <input type="text" id="booking-location" placeholder="e.g. Room 101, Online">
          </div>
          
          <div class="form-group">
            <label for="booking-notes">Notes</label>
            <textarea id="booking-notes" placeholder="Additional notes..."></textarea>
          </div>
          
          <div class="form-actions">
            <button type="submit" id="booking-submit-btn" class="submit-btn">Add Booking</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- JavaScript Modules - CRITICAL LOAD ORDER -->
  <script src="js/db.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/events.js"></script>
  <script src="js/notes.js"></script>
  <script src="js/tasks.js"></script>
  <script src="js/bookings.js"></script>
  <script src="js/submissions.js"></script>
  <script src="js/forms.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/app.js"></script>

  <!-- Service Worker Registration -->
  <script>
    // Handle panel open/close for overlay
    document.addEventListener('DOMContentLoaded', function() {
      const eventPanel = document.getElementById('event-panel');
      const overlay = document.getElementById('panel-overlay');
      
      // MutationObserver to watch for panel class changes
      if (eventPanel && overlay) {
        const observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(mutation) {
            if (mutation.attributeName === 'class') {
              if (eventPanel.classList.contains('active')) {
                overlay.classList.add('active');
              } else {
                overlay.classList.remove('active');
              }
            }
          });
        });
        observer.observe(eventPanel, { attributes: true });
      }
    });
  </script>
</body>
</html>
